name: Generate Sponsors SVG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate SVG
        env:
          AFDIAN_USER_ID: ${{ secrets.AFDIAN_USER_ID }}
          AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}
          OPENCOLLECTIVE_SLUGS: ${{ vars.OPENCOLLECTIVE_SLUGS }}
        run: node src/cli.js
      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain dist/sponsors.svg)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add dist/sponsors.svg
            git commit -m "chore: update sponsors.svg"
            git push
          fi
